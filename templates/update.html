<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Photos - FaceID</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card);
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 1.875rem;
            color: #fff;
        }

        p {
            margin-bottom: 2rem;
            color: var(--text-dim);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.875rem;
            color: var(--text-dim);
        }

        select,
        input[type="file"] {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            border: 1px solid #334155;
            background-color: #0f172a;
            color: #fff;
            box-sizing: border-box;
            transition: border-color 0.2s;
            appearance: none;
        }

        select:focus,
        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .file-help {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 0.5rem;
        }

        button {
            width: 100%;
            padding: 0.875rem;
            border-radius: 0.75rem;
            border: none;
            background-color: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 1rem;
        }

        button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        .nav-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.875rem;
        }

        .nav-link:hover {
            color: #fff;
        }

        #status {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 0.75rem;
            display: none;
            font-size: 0.9rem;
        }

        .success {
            background-color: rgba(34, 197, 94, 0.1);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .error {
            background-color: rgba(239, 68, 68, 0.1);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Improve Accuracy</h1>
        <p>Add more photos to an existing person to improve identification and blink detection.</p>

        <form id="updateForm">
            <div class="form-group">
                <label for="name">Select Person</label>
                <select id="name" name="name" required>
                    <option value="" disabled selected>Choose a registered person...</option>
                    {% for emp in employees %}
                    <option value="{{ emp.name }}">{{ emp.name }} ({{ emp.department or 'No Dept' }})</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="images">Upload New Photos</label>
                <input type="file" id="images" name="images" accept="image/*" multiple required>
                <div class="file-help">Adding at least 3-5 photos from different angles is recommended.</div>
            </div>

            <button type="submit" id="submitBtn">Update Profile</button>
        </form>

        <a href="/enrol" class="nav-link">← Back to New Enrolment</a>

        <div id="status"></div>
    </div>

    <script>
        const form = document.getElementById('updateForm');
        const status = document.getElementById('status');
        const btn = document.getElementById('submitBtn');

        form.onsubmit = async (e) => {
            e.preventDefault();

            btn.disabled = true;
            btn.textContent = "Processing...";
            status.style.display = 'none';

            const formData = new FormData(form);

            try {
                // Re-using the /onboard endpoint since it now supports merging
                const response = await fetch('/onboard', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                status.style.display = 'block';
                if (response.ok) {
                    status.className = 'success';
                    status.textContent = "✓ Successfully added photos! Accuracy for " + formData.get('name') + " has been improved.";
                    form.reset();
                } else {
                    status.className = 'error';
                    status.textContent = result.detail || "Update failed. Please try again.";
                }
            } catch (err) {
                status.className = 'error';
                status.textContent = "Connection error. Is the server running?";
            } finally {
                btn.disabled = false;
                btn.textContent = "Update Profile";
            }
        };
    </script>
</body>

</html>
